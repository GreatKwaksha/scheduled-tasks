
name: Test Weather and Twilio Setup

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests twilio

      - name: Check secrets are configured
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
        run: |
          if [ -z "$OPENWEATHER_API_KEY" ]; then
            echo "OPENWEATHER_API_KEY secret is not set!"
            exit 1
          else
            echo "✅ OPENWEATHER_API_KEY is configured"
          fi
          
          if [ -z "$TWILIO_SID" ]; then
            echo "TWILIO_SID secret is not set!"
            exit 1
          else
            echo "✅ TWILIO_SID is configured"
          fi

          if [ -z "$TWILIO_TOKEN" ]; then
            echo "TWILIO_TOKEN secret is not set!"
            exit 1
          else
            echo "✅ TWILIO_TOKEN is configured"
          fi

      - name: Check required Python file exists
        run: |
          if [ -f "main.py" ]; then
            echo "✅ main.py found"
          else
            echo "❌ main.py not found! Make sure your python file is named exactly main.py"
            exit 1
          fi

      - name: Test Python syntax
        run: python -m py_compile main.py && echo "✅ Python syntax OK"

      - name: Success
        run: |
          echo ""
          echo "========================================"
          echo "  All setup checks passed!"
          echo "  Your keys are ready for the weather app."
          echo "========================================"
